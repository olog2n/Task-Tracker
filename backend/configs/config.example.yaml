# configs/config.example.yaml
# ===========================================

database:
  driver: sqlite
  host: localhost
  port: 5432
  name: tracker
  user: postgres
  password: ""              # CHANGE_ME or DB_PASSWORD from .env
  sslmode: disable
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 1h

server:
  port: :6969
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 5s

auth:
  jwt_algorithm: HS256      # HS256 | ES256 | RS256
  jwt_secret: ""            # CHANGE_ME or AUTH_JWT_SECRET from .env (ONLY FOR HS256)
  jwt_private_key: ""       # CHANGE_ME or AUTH_JWT_PRIVATE_KEY from .env (ONLY FOR ES256/RS256)
  jwt_public_key: ""        # CHANGE_ME or AUTH_JWT_PUBLIC_KEY from .env (ONLY FOR ES256/RS256)
  jwt_key_id: "key-1"
  jwt_expiry: 24h
  jwt_refresh_expiry: 168h
  cookie_secure: false
  cookie_name_access: access_token
  cookie_name_refresh: refresh_token
  cookie_domain: ""
  cookie_path: /

logging:
  level: info
  format: text